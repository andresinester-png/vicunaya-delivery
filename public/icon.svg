<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#D32F2F"/>

  <!-- V shape using thick polyline (no font dependency) -->
  <polyline
    points="68,88 256,418 444,88"
    fill="none"
    stroke="white"
    stroke-width="80"
    stroke-linecap="round"
    stroke-linejoin="miter"
    stroke-miterlimit="2"
  />

  <!-- "Ya" white pill badge, bottom-right -->
  <rect x="298" y="352" width="162" height="76" rx="22" fill="white"/>
  <text
    x="379" y="406"
    text-anchor="middle"
    font-family="sans-serif"
    font-weight="bold"
    font-size="50"
    fill="#D32F2F"
  >Ya</text>
</svg>
