<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>

  <!-- K letter: vertical stroke + two diagonal arms -->
  <!-- Vertical bar -->
  <rect x="140" y="112" width="72" height="288" rx="20" fill="#86f2e4"/>
  <!-- Upper arm: from mid-left to top-right -->
  <polygon
    points="212,256 380,112 448,112 448,176 280,290"
