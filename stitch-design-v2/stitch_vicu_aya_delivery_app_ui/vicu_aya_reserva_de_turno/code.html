<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VicuñaYa - Reserva de Turno</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Font: Inter (Simulating standard modern UI font) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-styles">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    .custom-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
    }
    .status-bar-safe {
      padding-top: env(safe-area-inset-top);
    }
    .bottom-nav-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Custom Red Theme */
    .brand-red {
      background-color: #e11d48;
    }
    .brand-text-red {
      color: #e11d48;
    }
    /* Scroll hiding for tabs */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800">
<!-- BEGIN: Header -->
<header class="brand-red text-white sticky top-0 z-50 status-bar-safe px-4 pb-6 rounded-b-3xl">
<div class="flex justify-between items-center py-4">
<div class="flex items-center gap-3">
<button class="p-2 bg-white/20 rounded-full">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-xl font-bold">Reserva de Turno</h1>
</div>
<button class="p-2 bg-white/20 rounded-full">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<div class="mt-2">
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center">
<svg class="h-5 w-5 text-gray-400" fill="currentColor" viewbox="0 0 20 20">
<path clip-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" fill-rule="evenodd"></path>
</svg>
</span>
<input class="w-full pl-10 pr-4 py-3 rounded-2xl border-none text-slate-900 focus:ring-0 text-sm" placeholder="Peluquerías, talleres, turnos..." type="text"/>
</div>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<main class="flex-grow px-4 py-6 space-y-6 overflow-y-auto">
<!-- BEGIN: Business Info Card -->
<section class="bg-white p-4 rounded-3xl custom-shadow flex items-center gap-4" data-purpose="business-info">
<div class="w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center text-brand-red">
<svg class="h-8 w-8 brand-text-red" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div class="flex-grow">
<h2 class="font-bold text-lg">Peluquería Juan José Sordelli</h2>
<p class="text-slate-500 text-xs flex items-center gap-1">
<svg class="h-3 w-3" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          San Martín 456, Vicuña Mackenna
        </p>
</div>
<span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-medium uppercase tracking-wider">Otro</span>
</section>
<!-- END: Business Info Card -->
<!-- BEGIN: Stepper Progress -->
<section class="px-2" data-purpose="stepper">
<div class="relative flex items-center justify-between">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-slate-200"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-1 brand-red transition-all duration-500" style="width: 50%;"></div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-4 h-4 rounded-full brand-red border-4 border-white"></div>
<span class="text-[10px] font-bold uppercase tracking-tight">Servicio</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-4 h-4 rounded-full brand-red border-4 border-white"></div>
<span class="text-[10px] font-bold uppercase tracking-tight">Día y Horario</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-4 h-4 rounded-full bg-slate-300 border-4 border-white"></div>
<span class="text-[10px] font-bold uppercase tracking-tight text-slate-400">Confirmar</span>
</div>
</div>
</section>
<!-- END: Stepper Progress -->
<!-- BEGIN: Date Selection -->
<section class="space-y-4" data-purpose="calendar-selection">
<div class="flex justify-between items-center">
<h3 class="font-bold text-slate-800 text-lg">Junio de 2026</h3>
</div>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<!-- Active Day -->
<button class="flex-shrink-0 w-16 h-20 brand-red text-white rounded-2xl flex flex-col items-center justify-center gap-1 shadow-lg shadow-rose-200">
<span class="text-[10px] font-medium uppercase">Dom</span>
<span class="text-xl font-bold">28</span>
<div class="w-1 h-1 bg-white rounded-full"></div>
</button>
<!-- Inactive Days -->
<button class="flex-shrink-0 w-16 h-20 bg-white border border-slate-100 text-slate-400 rounded-2xl flex flex-col items-center justify-center gap-1">
<span class="text-[10px] font-medium uppercase">Lun</span>
<span class="text-xl font-bold">29</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full"></div>
</button>
<button class="flex-shrink-0 w-16 h-20 bg-white border border-slate-100 text-slate-400 rounded-2xl flex flex-col items-center justify-center gap-1">
<span class="text-[10px] font-medium uppercase">Mar</span>
<span class="text-xl font-bold">30</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full"></div>
</button>
<button class="flex-shrink-0 w-16 h-20 bg-white border border-slate-100 text-slate-400 rounded-2xl flex flex-col items-center justify-center gap-1">
<span class="text-[10px] font-medium uppercase">Mié</span>
<span class="text-xl font-bold">01</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full"></div>
</button>
<button class="flex-shrink-0 w-16 h-20 bg-white border border-slate-100 text-slate-400 rounded-2xl flex flex-col items-center justify-center gap-1">
<span class="text-[10px] font-medium uppercase">Jue</span>
<span class="text-xl font-bold">02</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full"></div>
</button>
<button class="flex-shrink-0 w-16 h-20 bg-white border border-slate-100 text-slate-400 rounded-2xl flex flex-col items-center justify-center gap-1">
<span class="text-[10px] font-medium uppercase">Vie</span>
<span class="text-xl font-bold">03</span>
<div class="w-1 h-1 bg-emerald-400 rounded-full"></div>
</button>
</div>
</section>
<!-- END: Date Selection -->
<!-- BEGIN: Time Selection -->
<section class="bg-white p-6 rounded-3xl custom-shadow space-y-6" data-purpose="time-slots">
<h3 class="font-bold text-slate-800">Domingo, 28 de Junio</h3>
<div class="grid grid-cols-2 gap-3">
<button class="py-3 border border-emerald-500/20 bg-emerald-50 text-emerald-700 rounded-2xl font-semibold text-center hover:bg-emerald-100 transition-colors">
          12:30
        </button>
<button class="py-3 border border-emerald-500/20 bg-emerald-50 text-emerald-700 rounded-2xl font-semibold text-center hover:bg-emerald-100 transition-colors">
          17:00
        </button>
<button class="py-3 border border-emerald-500/20 bg-emerald-50 text-emerald-700 rounded-2xl font-semibold text-center hover:bg-emerald-100 transition-colors">
          17:30
        </button>
<button class="py-3 border border-slate-100 bg-slate-50 text-slate-400 rounded-2xl font-semibold text-center cursor-not-allowed opacity-60">
          18:00
        </button>
<button class="py-3 border border-emerald-500/20 bg-emerald-50 text-emerald-700 rounded-2xl font-semibold text-center hover:bg-emerald-100 transition-colors">
          18:30
        </button>
<button class="py-3 border border-emerald-500/20 bg-emerald-50 text-emerald-700 rounded-2xl font-semibold text-center hover:bg-emerald-100 transition-colors">
          19:00
        </button>
</div>
<div class="flex justify-center gap-6 text-xs text-slate-500 pt-2 border-t border-slate-100">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-sm bg-emerald-100 border border-emerald-200"></div>
<span>Disponible</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-sm bg-slate-100 border border-slate-200"></div>
<span>Reservado</span>
</div>
</div>
</section>
<!-- END: Time Selection -->
<!-- BEGIN: Form Section (From Step 3 Context) -->
<section class="bg-white p-6 rounded-3xl custom-shadow space-y-6" data-purpose="user-form">
<h3 class="font-bold text-slate-800">Tus datos</h3>
<div class="space-y-4">
<div>
<label class="block text-xs font-medium text-slate-500 mb-1 ml-1">Tu nombre</label>
<input class="w-full px-4 py-3 bg-slate-50 border-slate-100 rounded-2xl focus:ring-rose-500 focus:border-rose-500 text-sm" placeholder="Juan García" type="text"/>
</div>
<div>
<label class="block text-xs font-medium text-slate-500 mb-1 ml-1">Teléfono</label>
<input class="w-full px-4 py-3 bg-slate-50 border-slate-100 rounded-2xl focus:ring-rose-500 focus:border-rose-500 text-sm" placeholder="3571-123456" type="tel"/>
</div>
<div>
<label class="block text-xs font-medium text-slate-500 mb-1 ml-1">Notas (opcional)</label>
<textarea class="w-full px-4 py-3 bg-slate-50 border-slate-100 rounded-2xl focus:ring-rose-500 focus:border-rose-500 text-sm" placeholder="Algo que quieras avisar..." rows="3"></textarea>
</div>
</div>
</section>
<!-- END: User Form -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Action Area -->
<footer class="bg-white border-t border-slate-100 p-4 bottom-nav-safe sticky bottom-0">
<div class="mb-4 text-center">
<p class="text-xs text-slate-400">Seleccioná un horario verde para continuar</p>
</div>
<button class="w-full brand-red text-white font-bold py-4 rounded-2xl shadow-lg shadow-rose-200 active:scale-[0.98] transition-transform">
      Continuar
    </button>
<!-- Navigation Tabs -->
<nav class="flex justify-between items-center mt-6 px-4">
<div class="flex flex-col items-center gap-1 opacity-40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Inicio</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Pedidos</span>
</div>
<div class="flex flex-col items-center gap-1 brand-text-red">
<div class="bg-rose-50 p-2 rounded-xl mb-1">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-bold">Turnos</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Mis turnos</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Perfil</span>
</div>
</nav>
</footer>
<!-- END: Bottom Action Area -->
</body></html>
