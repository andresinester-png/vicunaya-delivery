<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VicuñaYa - Pago</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Font (Inter is a good professional default) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="layout">
    /* Ensure the mobile view feels like an app */
    .app-container {
      max-width: 430px; /* iPhone 14/15 Pro Max width approx */
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f9fafb;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="bg-gray-100">
<div class="app-container bg-white shadow-xl relative overflow-hidden">
<!-- BEGIN: Solid Red Header -->
<header class="bg-[#E53935] text-white pt-10 pb-6 px-4 rounded-b-[2rem] shadow-lg" data-purpose="main-header">
<div class="flex items-center justify-between mb-4">
<button class="p-2 hover:bg-white/10 rounded-full transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-xl font-bold">VicuñaYa - Pago</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<div class="text-center mt-2">
<p class="text-white/80 text-xs uppercase tracking-widest font-semibold">Total a Pagar</p>
<p class="text-4xl font-extrabold mt-1">$25.000</p>
<p class="text-white/90 text-sm mt-1">Donjonns</p>
</div>
</header>
<!-- END: Solid Red Header -->
<!-- BEGIN: Main Content -->
<main class="flex-1 px-4 py-6 space-y-4 -mt-4">
<!-- Delivery Details Card -->
<section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100" data-purpose="delivery-details">
<div class="flex items-center justify-between mb-4 pb-4 border-bottom border-gray-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center">
<!-- Linear Pin Icon -->
<svg class="h-5 w-5 text-[#E53935]" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="text-sm font-semibold text-gray-800">Dirección de entrega</p>
<p class="text-xs text-gray-500">Leandro n alem 572</p>
</div>
</div>
<button class="text-[#E53935] text-sm font-bold hover:underline">Cambiar</button>
</div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center">
<!-- Linear Delivery Icon -->
<svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<p class="text-sm font-semibold text-gray-800">Modo de entrega</p>
<p class="text-xs text-gray-500">Delivery</p>
</div>
</div>
</section>
<!-- Payment Method Selection -->
<section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100" data-purpose="payment-methods">
<h2 class="text-gray-800 font-bold mb-4">Método de pago</h2>
<div class="space-y-3">
<!-- Bank Transfer Option -->
<label class="relative flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-red-200 transition-all has-[:checked]:border-[#E53935] has-[:checked]:bg-red-50/30">
<input checked="" class="hidden peer" name="payment" type="radio"/>
<div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center mr-4">
<svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="flex-1 font-medium text-gray-700">Transferencia bancaria</span>
<div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-[#E53935] peer-checked:bg-[#E53935] flex items-center justify-center">
<div class="w-2 h-2 bg-white rounded-full"></div>
</div>
</label>
<!-- Cash Option -->
<label class="relative flex items-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-red-200 transition-all has-[:checked]:border-[#E53935] has-[:checked]:bg-red-50/30">
<input class="hidden peer" name="payment" type="radio"/>
<div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center mr-4">
<svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="flex-1 font-medium text-gray-700">Efectivo</span>
<div class="w-5 h-5 rounded-full border-2 border-gray-300 peer-checked:border-[#E53935] peer-checked:bg-[#E53935] flex items-center justify-center">
<div class="w-2 h-2 bg-white rounded-full"></div>
</div>
</label>
</div>
</section>
<!-- Order Summary Card -->
<section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-20" data-purpose="order-summary">
<h2 class="text-gray-800 font-bold mb-4">Tu pedido</h2>
<div class="flex items-center gap-4">
<div class="relative">
<img alt="Empanadas" class="w-14 h-14 rounded-xl object-cover shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDawG9bztJqcV4TzoQ5WjC09cfCFvSeYsdYG0BK7m7gqHvo8dIi6YItAxmBXMUAErvRNm2ntkTODIU84KSLWuqvItP3pjPoCrGMb66s-JHc0J9nQ34IrfmB3FC9y1HjUMcSRa_E_pvhEXVTg7MRVCSquSzVZyAf72qeiVoipOvavePzcYFn7a76onUlI5iPJoRY0mFz4LQPVko9goMVUhviFtCCFcn0-Ulpmys6lUSKDb2Yxnndn5cLvgbGYZGCqVMf7pEPVFd-e8-F"/>
<span class="absolute -top-2 -right-2 bg-[#E53935] text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">1</span>
</div>
<div class="flex-1">
<p class="text-sm font-semibold text-gray-800 line-clamp-1">Docena de carne DE LAB...</p>
<p class="text-xs text-gray-400">Personalizado</p>
</div>
<p class="font-bold text-[#E53935]">$25.000</p>
</div>
</section>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Fixed Footer Button -->
<div class="fixed bottom-[72px] left-0 right-0 px-4 pb-4 max-w-[430px] mx-auto z-20" data-purpose="action-button-container">
<button class="w-full bg-[#E53935] text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-transform flex items-center justify-between px-6">
<span>Pagar pedido</span>
<span class="bg-white/20 px-3 py-1 rounded-lg">$25.000</span>
</button>
</div>
<!-- END: Fixed Footer Button -->
<!-- BEGIN: Bottom Navigation -->
<nav class="bg-white border-t border-gray-100 flex items-center justify-around py-3 px-2 safe-area-bottom sticky bottom-0 z-30" data-purpose="bottom-navigation">
<button class="flex flex-col items-center gap-1 text-gray-400 group">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Inicio</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Buscar</span>
</button>
<button class="flex flex-col items-center gap-1 text-[#E53935]">
<div class="relative p-1 bg-red-50 rounded-lg">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-bold">Carrito</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Pedidos</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium">Perfil</span>
</button>
</nav>
<!-- END: Bottom Navigation -->
</div>
</body></html>
